  data:
    enabled: false
  databases:
    pg0:
      backupStorage: 3Gi
      names:
      - dev
      - prod
      storage: 1Gi
  documentStores:
    prod:
      storage: 1Gi
  files: []
  quota:
    budget: x-large
    memory: 6Gi
    storage: 1Gi
  registry:
    enabled: false
  secretName: s-jeff
  security:
    kubernetesAccess: false
  sessions: []
  userOverrides:
    jim:
      grantedAt: "2025-01-10T19:00:00Z"
      role: admin
  users:
  - jeff
  - jim
  - jane
  vcluster: false
  vectorStores:
    prod:
      storage: 1Gi
status:
  conditions:
  - lastTransitionTime: "2024-01-01T00:00:00Z"
    message: 'Unready resources: db-configmap-s-jeff-pg0, db-postgrescluster-s-jeff-pg0,
      db-tlsroute-s-jeff-pg0, and 28 more'
    reason: Creating
    status: "False"
    type: Ready
  sessions: {}
---
apiVersion: kubernetes.m.crossplane.io/v1alpha1
kind: Object
metadata:
  annotations:
    crossplane.io/composition-resource-name: db-configmap-s-jeff-pg0
  labels:
    crossplane.io/composite: s-jeff
  name: db-configmap-s-jeff-pg0
  namespace: default
  ownerReferences:
  - apiVersion: pkg.internal/v1beta1
    blockOwnerDeletion: true
    controller: true
    kind: Datalab
    name: s-jeff
    uid: ""
spec:
  forProvider:
    manifest:
      apiVersion: v1
      data:
        init.sql: |
          \set ON_ERROR_STOP on
          \connect postgres
      kind: ConfigMap
      metadata:
        name: pg0-init-sql
        namespace: s-jeff
  providerConfigRef:
    kind: ProviderConfig
    name: provider-kubernetes
  readiness:
    policy: SuccessfulCreate
  watch: true
---
apiVersion: kubernetes.m.crossplane.io/v1alpha1
kind: Object
metadata:
  annotations:
    crossplane.io/composition-resource-name: db-postgrescluster-s-jeff-pg0
  labels:
    crossplane.io/composite: s-jeff
  name: db-postgrescluster-s-jeff-pg0
  namespace: default
  ownerReferences:
  - apiVersion: pkg.internal/v1beta1
    blockOwnerDeletion: true
    controller: true
    kind: Datalab
    name: s-jeff
    uid: ""
spec:
  forProvider:
    manifest:
      apiVersion: postgres-operator.crunchydata.com/v1beta1
      kind: PostgresCluster
      metadata:
        name: pg0
        namespace: s-jeff
      spec:
        backups:
          pgbackrest:
            global:
              repo1-path: /pgbackrest/repo1
              repo1-retention-full: "4"
              repo1-retention-full-type: count
            repos:
            - name: repo1
              schedules:
                differential: 0 1 * * 1-6
                full: 0 1 * * 0
              volume:
                volumeClaimSpec:
                  accessModes:
                  - ReadWriteOnce
                  resources:
                    requests:
                      storage: 3Gi
        databaseInitSQL:
          key: init.sql
          name: pg0-init-sql
        instances:
        - dataVolumeClaimSpec:
            accessModes:
            - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi
          name: primary
          replicas: 1
        postGISVersion: "3.5"
        postgresVersion: 17
        users:
        - databases:
          - dev
          - prod
          name: postgres
        - name: jeff
        - name: jim
        - name: jane
  providerConfigRef:
    kind: ProviderConfig
    name: provider-kubernetes
  readiness:
    celQuery: has(object.status) && has(object.status.instances) && object.status.instances.exists(i,
      i.name == 'primary' && has(i.readyReplicas) && i.readyReplicas >= 1) && has(object.status.pgbackrest)
      && has(object.status.pgbackrest.repoHost) && object.status.pgbackrest.repoHost.ready
      == true
    policy: DeriveFromCelQuery
  watch: true
---
apiVersion: kubernetes.m.crossplane.io/v1alpha1
