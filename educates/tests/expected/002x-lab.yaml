apiVersion: kubernetes.m.crossplane.io/v1alpha1
kind: Object
metadata:
  annotations:
    crossplane.io/composition-resource-name: workshop-s-jeff
  labels:
    crossplane.io/composite: s-jeff
  name: workshop-s-jeff
  namespace: default
