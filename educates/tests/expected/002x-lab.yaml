    name: s-jeff
    uid: ""
spec:
  forProvider:
    manifest:
      apiVersion: training.educates.dev/v1beta1
      kind: Workshop
      metadata:
        name: s-jeff
      spec:
        description: A default DataLab environment.
        environment:
          objects:
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-web-egress
            spec:
              egress:
              - ports:
                - port: 53
                  protocol: UDP
                - port: 53
                  protocol: TCP
                to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: kube-system
              - to:
                - ipBlock:
                    cidr: 10.0.0.0/8
                - ipBlock:
                    cidr: 172.16.0.0/12
                - ipBlock:
                    cidr: 192.168.0.0/16
                - ipBlock:
                    cidr: 100.64.0.0/10
              - to:
                - ipBlock:
                    cidr: fc00::/7
              - to:
                - namespaceSelector: {}
              - to:
                - ipBlock:
                    cidr: 0.0.0.0/0
                    except:
                    - 169.254.42.42/32
              - to:
                - ipBlock:
                    cidr: ::/0
                    except:
                    - fd00:42::42/128
              podSelector: {}
              policyTypes:
              - Egress
          secrets:
          - name: s-jeff-datalab
            namespace: default
        session:
          applications:
            console:
              enabled: false
            editor:
              enabled: true
            slides:
              enabled: false
            terminal:
              enabled: true
            vcluster:
              enabled: false
              services:
                fromHost:
                - from: $(workshop_namespace)/pg0-primary
                  to: $(workshop_namespace)/pg0-primary
              version: "1.34"
            workshop:
              enabled: false
          dashboards: []
          envFrom:
          - secretRef:
              name: s-jeff-datalab
          ingresses: []
          namespaces:
            budget: x-large
            role: edit
            security:
              policy: baseline
              token:
                enabled: false
          objects: []
          resources:
            memory: 6Gi
            storage: 1Gi
        title: Default DataLab
        version: "1.0"
        workshop:
          files: []
          packages:
          - files:
            - image:
                url: ghcr.io/versioneer-tech/educates-extension-packages/awscli:v2.29.0
            name: awscli
          - files:
            - image:
                url: ghcr.io/versioneer-tech/educates-extension-packages/rclone:v1.71.0
            name: rclone
  providerConfigRef:
    kind: ProviderConfig
    name: provider-kubernetes
  readiness:
    policy: SuccessfulCreate
  watch: true
