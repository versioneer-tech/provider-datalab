apiVersion: kubernetes.m.crossplane.io/v1alpha1
kind: Object
metadata:
  annotations:
    crossplane.io/composition-resource-name: workshop-s-joe
  labels:
    crossplane.io/composite: s-joe
  name: workshop-s-joe
  namespace: default
  ownerReferences:
  - apiVersion: pkg.internal/v1beta2
    blockOwnerDeletion: true
    controller: true
    kind: Datalab
    name: s-joe
    uid: ""
spec:
  forProvider:
    manifest:
      apiVersion: training.educates.dev/v1beta1
      kind: Workshop
      metadata:
        name: s-joe
      spec:
        description: A default DataLab environment.
        environment:
          objects:
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: deny-egress
            spec:
              egress: []
              podSelector: {}
              policyTypes:
              - Egress
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-namespace-egress
            spec:
              egress:
              - to:
                - podSelector: {}
              podSelector: {}
              policyTypes:
              - Egress
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-dns-egress
            spec:
              egress:
              - ports:
                - port: 53
                  protocol: UDP
                - port: 53
                  protocol: TCP
                to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: kube-system
              podSelector: {}
              policyTypes:
              - Egress
          - apiVersion: networking.k8s.io/v1
            kind: NetworkPolicy
            metadata:
              name: allow-external-egress
            spec:
              egress:
              - to:
                - ipBlock:
                    cidr: 0.0.0.0/0
                    except:
                    - 169.254.169.254/32
                    - 169.254.42.42/32
                    - 10.42.0.0/16
                    - 10.43.0.0/16
              - to:
                - ipBlock:
                    cidr: ::/0
                    except:
                    - fd00:ec2::254/128
                    - fd00:42::42/128
              podSelector: {}
              policyTypes:
              - Egress
          - apiVersion: v1
            kind: PersistentVolumeClaim
            metadata:
              name: s-joe-datalab
            spec:
              accessModes:
              - ReadOnlyMany
              resources:
                requests:
                  storage: 1Mi
              storageClassName: csi-rclone
          secrets:
          - name: s-joe-datalab
            namespace: default
        session:
          applications:
            console:
              enabled: false
            editor:
              enabled: true
            slides:
              enabled: false
            terminal:
              enabled: true
            vcluster:
              enabled: false
              services:
                fromHost: []
              version: "1.34"
            workshop:
              enabled: false
          dashboards:
          - name: Data
            url: $(ingress_protocol)://data-$(session_name).$(ingress_domain)/
          envFrom:
          - secretRef:
              name: s-joe-datalab
          ingresses:
          - host: data-$(session_name).$(workshop_namespace).svc.$(cluster_domain)
            name: data
            port: 8888
            protocol: http
          namespaces:
            budget: medium
            role: edit
            security:
              policy: baseline
              token:
                enabled: true
          objects:
          - apiVersion: apps/v1
            kind: Deployment
            metadata:
              labels:
                app.kubernetes.io/instance: data-$(session_name)
                app.kubernetes.io/name: data
              name: data-$(session_name)
              namespace: $(workshop_namespace)
            spec:
              replicas: 1
              selector:
                matchLabels:
                  app.kubernetes.io/instance: data-$(session_name)
                  app.kubernetes.io/name: data
              template:
                metadata:
                  labels:
                    app.kubernetes.io/instance: data-$(session_name)
                    app.kubernetes.io/name: data
                spec:
                  containers:
                  - env:
                    - name: FB_AUTH_MAPPER
                      value: writer-noshare
                    - name: FB_ALLOW_CHANGING
                      value: "true"
                    - name: FB_ALLOW_SHARING
                      value: "false"
                    - name: FB_CREATE_USER_DIR
                      value: "false"
                    - name: FB_DATABASE
                      value: /db/bolt.db
                    - name: FB_SERVER_PORT
                      value: "8888"
                    - name: WORKSPACE
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.namespace
                    - name: FB_ROOT
                      value: /workspace
                    - name: FB_BRANDING_NAME
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.namespace
                    - name: FB_AUTH_HEADER
                      value: Accept
                    - name: AWS_ACCESS_KEY_ID
                      valueFrom:
                        secretKeyRef:
                          key: AWS_ACCESS_KEY_ID
                          name: s-joe-datalab
                    - name: AWS_SECRET_ACCESS_KEY
                      valueFrom:
                        secretKeyRef:
                          key: AWS_SECRET_ACCESS_KEY
                          name: s-joe-datalab
                    - name: AWS_REGION
                      valueFrom:
                        secretKeyRef:
                          key: AWS_REGION
                          name: s-joe-datalab
                    - name: AWS_ENDPOINT_URL
                      valueFrom:
                        secretKeyRef:
                          key: AWS_ENDPOINT_URL
                          name: s-joe-datalab
                    - name: AWS_S3_FORCE_PATH_STYLE
                      valueFrom:
                        secretKeyRef:
                          key: AWS_S3_FORCE_PATH_STYLE
                          name: s-joe-datalab
                    image: ghcr.io/versioneer-tech/package-r:v2026.6.4
                    imagePullPolicy: Always
                    livenessProbe:
                      exec:
                        command:
                        - /bin/sh
                        - -lc
                        - out="$( (stat /workspace >/dev/null) 2>&1 || true )"; if
                          echo "$out" | grep -qi "Transport endpoint is not connected";
                          then exit 1; fi; exit 0
                      periodSeconds: 20
                    name: data
                    ports:
                    - containerPort: 8888
                      name: http
                    readinessProbe:
                      exec:
                        command:
                        - /bin/sh
                        - -lc
                        - stat /workspace >/dev/null
                      periodSeconds: 10
                    resources:
                      limits:
                        cpu: "1"
                        memory: 512Mi
                      requests:
                        cpu: 100m
                        memory: 128Mi
                    securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                        - ALL
                    volumeMounts:
                    - mountPath: /workspace
                      name: data
                      readOnly: false
                    - mountPath: /db
                      name: db
                  securityContext:
                    fsGroup: 100
                    fsGroupChangePolicy: OnRootMismatch
                    runAsGroup: 100
                    runAsNonRoot: true
                    runAsUser: 1000
                    seccompProfile:
                      type: RuntimeDefault
                  serviceAccountName: $(service_account)
                  volumes:
                  - name: data
                    persistentVolumeClaim:
                      claimName: s-joe-datalab
                  - emptyDir: {}
                    name: db
          - apiVersion: v1
            kind: Service
            metadata:
              name: data-$(session_name)
              namespace: $(workshop_namespace)
            spec:
              ports:
              - name: http
                port: 8888
                protocol: TCP
                targetPort: http
              selector:
                app.kubernetes.io/instance: data-$(session_name)
                app.kubernetes.io/name: data
              type: ClusterIP
          resources:
            memory: 2Gi
            storage: 1Gi
        title: Default DataLab
        version: "1.0"
        workshop:
          files: []
          packages:
          - files:
            - image:
                url: ghcr.io/versioneer-tech/educates-extension-packages/awscli:v2.29.0
            name: awscli
          - files:
            - image:
                url: ghcr.io/versioneer-tech/educates-extension-packages/rclone:v1.71.0
            name: rclone
  providerConfigRef:
    kind: ProviderConfig
    name: provider-kubernetes
  readiness:
    policy: SuccessfulCreate
  watch: true
