apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: datalab-educates
  labels:
    provider: educates
spec:
  compositeTypeRef:
    apiVersion: pkg.internal/v1beta2
    kind: Datalab
  mode: Pipeline
  pipeline:
    - step: load-datalab-environment
      functionRef:
        name: crossplane-contrib-function-python
      input:
        apiVersion: python.fn.crossplane.io/v1beta1
        kind: Script
        script: |
          from crossplane.function import request, response, resource
          from crossplane.function.proto.v1 import run_function_pb2 as fnv1
          from google.protobuf import json_format

          ENVIRONMENT_KEY = "apiextensions.crossplane.io/environment"

          def _to_dict(struct):
              return {} if struct is None else (struct if isinstance(struct, dict) else json_format.MessageToDict(struct, preserving_proto_field_name=True))

          def compose(req: fnv1.RunFunctionRequest, rsp: fnv1.RunFunctionResponse):
              xr = _to_dict(req.observed.composite.resource)
              meta = xr.get("metadata", {}) or {}
              annotations = meta.get("annotations", {}) or {}
              labels = meta.get("labels", {}) or {}
              env_name = (
                  annotations.get("datalabs.pkg.internal/environment")
                  or labels.get("datalabs.pkg.internal/environment")
                  or "datalab"
              ).strip() or "datalab"

              response.require_resources(
                  rsp,
                  name="datalab-environment",
                  api_version="apiextensions.crossplane.io/v1beta1",
                  kind="EnvironmentConfig",
                  match_name=env_name,
              )

              environment = request.get_required_resource(req, "datalab-environment") or {}
              environment_data = (environment.get("data") or {})
              rsp.context.MergeFrom(resource.dict_to_struct({ENVIRONMENT_KEY: environment_data}))

    - step: observe-storage-secret
      functionRef:
        name: crossplane-contrib-function-python
      input:
        apiVersion: python.fn.crossplane.io/v1beta1
        kind: Script
        script: |
          from crossplane.function.proto.v1 import run_function_pb2 as fnv1
          from google.protobuf import json_format as _json_format
          import base64
          import hashlib

          def _to_dict(s):
              return {} if s is None else _json_format.MessageToDict(s, preserving_proto_field_name=True)

          def compose(req: fnv1.RunFunctionRequest, rsp: fnv1.RunFunctionResponse):
              xr = _to_dict(req.observed.composite.resource)
              meta = xr.get("metadata", {}) or {}
              spec = xr.get("spec", {}) or {}

              xr_name = meta.get("name")
              xr_namespace = meta.get("namespace") or "default"

              ctx = _to_dict(req.context)
              env = ctx.get("apiextensions.crossplane.io/environment", {}) or {}
              storage_env = env.get("storage") or {}

              secret_name = spec.get("secretName") or meta.get("name")
              secret_namespace = storage_env.get("secretNamespace") or meta.get("namespace") or "default"

              key = f"observe-storage-secret-{xr_name}"
              rsp.desired.resources[key].resource.update({
                  "apiVersion": "kubernetes.m.crossplane.io/v1alpha1",
                  "kind": "Object",
                  "metadata": {
                      "name": key,
                      "namespace": xr_namespace,
                      "annotations": {"crossplane.io/composition-resource-name": key},
                  },
                  "spec": {
                      "managementPolicies": ["Observe"],
                      "forProvider": {
                          "manifest": {
                              "apiVersion": "v1",
                              "kind": "Secret",
                              "metadata": {"name": secret_name, "namespace": secret_namespace},
                          }
                      },
                      "providerConfigRef": {"name": "provider-kubernetes", "kind": "ProviderConfig"},
                      "watch": False,
                  },
              })

    - step: observe-database-secret
      functionRef:
        name: crossplane-contrib-function-python
      input:
        apiVersion: python.fn.crossplane.io/v1beta1
        kind: Script
        script: |
          from crossplane.function.proto.v1 import run_function_pb2 as fnv1
          from google.protobuf import json_format as _json_format

          def _to_dict(s):
              return {} if s is None else _json_format.MessageToDict(s, preserving_proto_field_name=True)

          def compose(req: fnv1.RunFunctionRequest, rsp: fnv1.RunFunctionResponse):
              xr = _to_dict(req.observed.composite.resource)
              meta = xr.get("metadata", {}) or {}
              spec = xr.get("spec", {}) or {}

              xr_name = meta.get("name")
              xr_namespace = meta.get("namespace") or "default"

              db_hosts = spec.get("databases")
              if not isinstance(db_hosts, dict) or not db_hosts:
                  return

              def emit(key, secret_name, secret_namespace):
                  rsp.desired.resources[key].resource.update({
                      "apiVersion": "kubernetes.m.crossplane.io/v1alpha1",
                      "kind": "Object",
                      "metadata": {
                          "name": key,
                          "namespace": xr_namespace,
                          "annotations": {"crossplane.io/composition-resource-name": key},
                      },
                      "spec": {
                          "managementPolicies": ["Observe"],
                          "forProvider": {
                              "manifest": {
                                  "apiVersion": "v1",
                                  "kind": "Secret",
                                  "metadata": {"name": secret_name, "namespace": secret_namespace},
                              }
                          },
                          "providerConfigRef": {"name": "provider-kubernetes", "kind": "ProviderConfig"},
                          "watch": False,
                      },
                  })

              secret_namespace = meta.get("name")

              for host_key in sorted(list(db_hosts.keys())):
                  if not isinstance(host_key, str) or not host_key.strip():
                      continue
                  cluster_name = host_key.strip()
                  emit(
                      f"observe-database-secret-{xr_name}-{cluster_name}",
                      f"{cluster_name}-pguser-postgres",
                      secret_namespace,
                  )

    - step: observe-store-secrets
      functionRef:
        name: crossplane-contrib-function-python
      input:
        apiVersion: python.fn.crossplane.io/v1beta1
        kind: Script
        script: |
          from crossplane.function.proto.v1 import run_function_pb2 as fnv1
          from google.protobuf import json_format as _json_format

          def _to_dict(s):
              return {} if s is None else _json_format.MessageToDict(s, preserving_proto_field_name=True)

          def _safe_str(v):
              return str(v).strip() if v is not None else ""

          def _extract_manifest(objres):
              if not objres or not getattr(objres, "resource", None):
                  return {}
              od = _to_dict(objres.resource)
              st = (od.get("status") or {}).get("atProvider") or {}
              return (st.get("manifest") or (st.get("raw") or {}).get("manifest") or {}) or {}

          def compose(req: fnv1.RunFunctionRequest, rsp: fnv1.RunFunctionResponse):
              xr = _to_dict(req.observed.composite.resource)
              meta = xr.get("metadata", {}) or {}
              spec = xr.get("spec", {}) or {}

              xr_name = meta.get("name")
              xr_namespace = meta.get("namespace") or "default"

              observed = getattr(req.observed, "resources", {}) or {}
              env_manifest = _extract_manifest(observed.get(f"workshopenvironment-{xr_name}"))
              educates_status = (env_manifest.get("status") or {}).get("educates") or {}
              workshop_ns = _safe_str(educates_status.get("namespace") or xr_name)

              def emit(key, secret_name):
                  rsp.desired.resources[key].resource.update({
                      "apiVersion": "kubernetes.m.crossplane.io/v1alpha1",
                      "kind": "Object",
                      "metadata": {
                          "name": key,
                          "namespace": xr_namespace,
                          "annotations": {"crossplane.io/composition-resource-name": key},
                      },
                      "spec": {
                          "managementPolicies": ["Observe"],
                          "forProvider": {
                              "manifest": {
                                  "apiVersion": "v1",
                                  "kind": "Secret",
                                  "metadata": {"name": secret_name, "namespace": workshop_ns},
                              }
                          },
                          "providerConfigRef": {"name": "provider-kubernetes", "kind": "ProviderConfig"},
                          "watch": False,
                      },
                  })

              document_stores = spec.get("documentStores") or {}
              if isinstance(document_stores, dict):
                  for store_name in sorted(document_stores.keys()):
                      if isinstance(store_name, str) and store_name.strip():
                          store = store_name.strip()
                          emit(f"observe-mongodb-auth-secret-{xr_name}-{store}", f"{store}-mongodb-auth")

              cache_stores = spec.get("cacheStores") or {}
              if isinstance(cache_stores, dict):
                  for store_name in sorted(cache_stores.keys()):
                      if isinstance(store_name, str) and store_name.strip():
                          store = store_name.strip()
                          emit(f"observe-redis-auth-secret-{xr_name}-{store}", f"{store}-redis-auth")

              vector_stores = spec.get("vectorStores") or {}
              if isinstance(vector_stores, dict):
                  for store_name in sorted(vector_stores.keys()):
                      if isinstance(store_name, str) and store_name.strip():
                          store = store_name.strip()
                          emit(f"observe-qdrant-auth-secret-{xr_name}-{store}", f"{store}-qdrant-auth")

    - step: update-secret-datalab
      functionRef:
        name: crossplane-contrib-function-python
      input:
        apiVersion: python.fn.crossplane.io/v1beta1
        kind: Script
        script: |
          import base64 as _base64
          from crossplane.function.proto.v1 import run_function_pb2 as fnv1
          from google.protobuf import json_format as _json_format
          import re
          from urllib.parse import urlsplit, urlunsplit

          def _to_dict(s):
              if s is None:
                  return {}
              return s if isinstance(s, dict) else _json_format.MessageToDict(s, preserving_proto_field_name=True)

          def _safe_str(v):
              return str(v).strip()

          def _b64get_any(d, keys):
              if not d:
                  return None
              for k in keys:
                  v = d.get(k)
                  if v is None:
                      continue
                  try:
                      return _base64.b64decode(v, validate=True).decode("utf-8")
                  except Exception:
                      return str(v)
              return None

          def _extract_data(objres):
              if not objres or not getattr(objres, "resource", None):
                  return {}
              od = _to_dict(objres.resource)
              st = (od.get("status") or {}).get("atProvider") or {}
              m1 = st.get("manifest") or {}
              m2 = (st.get("raw") or {}).get("manifest") or {}
              return (m1.get("data") or m1.get("stringData") or m2.get("data") or m2.get("stringData") or {}) or {}

          def _extract_manifest(objres):
              if not objres or not getattr(objres, "resource", None):
                  return {}
              od = _to_dict(objres.resource)
              st = (od.get("status") or {}).get("atProvider") or {}
              return (st.get("manifest") or (st.get("raw") or {}).get("manifest") or {}) or {}

          def _store_key(prefix, store_name, suffix):
              clean = re.sub(r"[^A-Za-z0-9]", "_", str(store_name)).upper()
              return f"{prefix}_{clean}_{suffix}"

          def _pg_key(host_name, suffix):
              clean = re.sub(r"[^A-Za-z0-9]", "_", str(host_name)).upper()
              return f"POSTGRES_{clean}_{suffix}"

          def _pg_db_key(host_name, db_name, suffix):
              host_clean = re.sub(r"[^A-Za-z0-9]", "_", str(host_name)).upper()
              db_clean = re.sub(r"[^A-Za-z0-9]", "_", str(db_name)).upper()
              return f"POSTGRES_{host_clean}_{db_clean}_{suffix}"

          def _uri_with_database(uri, db_name):
              if not uri:
                  return ""
              parts = urlsplit(uri)
              return urlunsplit((parts.scheme, parts.netloc, f"/{db_name}", parts.query, parts.fragment))

          def _external_pg_url(internal_url, external_host):
              if not internal_url or not external_host:
                  return ""
              external_url = re.sub(r'@[^/]+', f'@{external_host}', internal_url)
              if "sslmode=" not in external_url:
                  external_url += "&sslmode=require" if "?" in external_url else "?sslmode=require"
              if "sslnegotiation=" not in external_url:
                  external_url += "&sslnegotiation=direct" if "?" in external_url else "?sslnegotiation=direct"
              return external_url

          def compose(req: fnv1.RunFunctionRequest, rsp: fnv1.RunFunctionResponse):
              xr = _to_dict(req.observed.composite.resource)
              meta = xr.get("metadata", {}) or {}
              spec = xr.get("spec", {}) or {}

              xr_name = meta.get("name")
              xr_namespace = meta.get("namespace") or "default"

              ctx = _to_dict(req.context)
              env = ctx.get("apiextensions.crossplane.io/environment", {}) or {}
              storage_env = env.get("storage") or {}
              observed = getattr(req.observed, "resources", {}) or {}

              env_manifest = _extract_manifest(observed.get(f"workshopenvironment-{xr_name}"))
              educates_status = (env_manifest.get("status") or {}).get("educates") or {}
              workshop_ns = _safe_str(educates_status.get("namespace") or xr_name)

              obs = observed.get(f"observe-storage-secret-{xr_name}")
              data_b64 = _extract_data(obs)

              access_key = _b64get_any(data_b64, ["AWS_ACCESS_KEY_ID","accessKey","username","CONSOLE_ACCESS_KEY","attribute.access"])
              secret_key = _b64get_any(data_b64, ["AWS_SECRET_ACCESS_KEY","secretKey","password","CONSOLE_SECRET_KEY","attribute.secret"])
              endpoint = _b64get_any(data_b64, ["AWS_ENDPOINT_URL"]) or storage_env.get("endpoint", "")
              region = _b64get_any(data_b64, ["AWS_REGION"]) or storage_env.get("region", "")
              rtype = storage_env.get("type", "")
              provider = storage_env.get("provider", "")
              force_path_style = str(storage_env.get("force_path_style", "true")).lower()

              if not access_key or not secret_key:
                  return

              config_data = (
                  f"[{access_key}]\n"
                  f"type = {rtype}\n"
                  f"provider = {provider}\n"
                  f"endpoint = {endpoint}\n"
                  f"region = {region}\n"
                  f"access_key_id = {access_key}\n"
                  f"secret_access_key = {secret_key}\n"
                  f"force_path_style = {force_path_style}\n"
              )

              manifest = {
                  "apiVersion": "v1",
                  "kind": "Secret",
                  "metadata": {"name": f"{xr_name}-datalab", "namespace": xr_namespace},
                  "type": "Opaque",
                  "stringData": {
                      "remote": access_key,
                      "remotePath": "/",
                      "configData": config_data,
                      "AWS_ACCESS_KEY_ID": access_key,
                      "AWS_SECRET_ACCESS_KEY": secret_key,
                      "AWS_REGION": region,
                      "AWS_ENDPOINT_URL": endpoint,
                      "AWS_S3_FORCE_PATH_STYLE": force_path_style,
                  },
              }

              doc_stores = spec.get("documentStores") or {}
              if isinstance(doc_stores, dict):
                  for store_name in sorted(doc_stores.keys()):
                      if not isinstance(store_name, str) or not store_name.strip():
                          continue
                      store = store_name.strip()
                      host = f"mongodb-{store}-svc.{workshop_ns}.svc"
                      user = f"{store}-app"
                      manifest["stringData"][_store_key("MONGO", store, "HOST")] = host
                      manifest["stringData"][_store_key("MONGO", store, "PORT")] = "27017"
                      manifest["stringData"][_store_key("MONGO", store, "DATABASE")] = store
                      manifest["stringData"][_store_key("MONGO", store, "AUTH_SOURCE")] = "admin"
                      manifest["stringData"][_store_key("MONGO", store, "USER")] = user
                      auth_data = _extract_data(observed.get(f"observe-mongodb-auth-secret-{xr_name}-{store}"))
                      pwd = _b64get_any(auth_data, ["password"])
                      if pwd:
                          manifest["stringData"][_store_key("MONGO", store, "PASSWORD")] = pwd
                          manifest["stringData"][_store_key("MONGO", store, "URI")] = (
                              f"mongodb://{user}:{pwd}@{host}:27017/{store}?authSource=admin"
                          )

              cache_stores = spec.get("cacheStores") or {}
              if isinstance(cache_stores, dict):
                  for store_name in sorted(cache_stores.keys()):
                      if not isinstance(store_name, str) or not store_name.strip():
                          continue
                      store = store_name.strip()
                      host = f"{store}.{workshop_ns}.svc"
                      manifest["stringData"][_store_key("REDIS", store, "HOST")] = host
                      manifest["stringData"][_store_key("REDIS", store, "PORT")] = "6379"
                      manifest["stringData"][_store_key("REDIS", store, "USER")] = "default"
                      manifest["stringData"][_store_key("REDIS", store, "DATABASE")] = "0"
                      auth_data = _extract_data(observed.get(f"observe-redis-auth-secret-{xr_name}-{store}"))
                      pwd = _b64get_any(auth_data, ["password"])
                      if pwd:
                          manifest["stringData"][_store_key("REDIS", store, "PASSWORD")] = pwd
                          manifest["stringData"][_store_key("REDIS", store, "URL")] = (
                              f"redis://default:{pwd}@{host}:6379/0"
                          )

              vector_stores = spec.get("vectorStores") or {}
              if isinstance(vector_stores, dict):
                  for store_name in sorted(vector_stores.keys()):
                      if not isinstance(store_name, str) or not store_name.strip():
                          continue
                      store = store_name.strip()
                      host = f"qdrant-{store}.{workshop_ns}.svc"
                      manifest["stringData"][_store_key("QDRANT", store, "HOST")] = host
                      manifest["stringData"][_store_key("QDRANT", store, "PORT")] = "6333"
                      manifest["stringData"][_store_key("QDRANT", store, "GRPC_PORT")] = "6334"
                      manifest["stringData"][_store_key("QDRANT", store, "URL")] = f"http://{host}:6333"
                      auth_data = _extract_data(observed.get(f"observe-qdrant-auth-secret-{xr_name}-{store}"))
                      api_key = _b64get_any(auth_data, ["apiKey"])
                      read_key = _b64get_any(auth_data, ["readApiKey"])
                      if api_key:
                          manifest["stringData"][_store_key("QDRANT", store, "API_KEY")] = api_key
                      if read_key:
                          manifest["stringData"][_store_key("QDRANT", store, "READ_API_KEY")] = read_key

              db_hosts = spec.get("databases") or {}
              if isinstance(db_hosts, dict):
                  db_env = env.get("database") or {}
                  gateway_env = db_env.get("gateway") or {}

                  gateway_parent_name = _safe_str(gateway_env.get("parentName") or "")
                  gateway_parent_ns = _safe_str(gateway_env.get("parentNamespace") or "")
                  gateway_section = _safe_str(gateway_env.get("sectionName") or "")
                  has_gateway_parent = bool(gateway_parent_name and gateway_parent_ns and gateway_section)

                  ingress_env = env.get("ingress") or {}
                  ingress_domain = ingress_env.get("domain", "default")

                  for host_key in sorted(list(db_hosts.keys())):
                      if not isinstance(host_key, str) or not host_key.strip():
                          continue
                      host_cfg = db_hosts.get(host_key) or {}
                      if not isinstance(host_cfg, dict):
                          continue

                      cluster_name = host_key.strip()
                      dbnames = [_safe_str(x) for x in list(host_cfg.get("names") or []) if _safe_str(x)]
                      if not dbnames:
                          continue

                      host_obs = observed.get(f"observe-database-secret-{xr_name}-{cluster_name}")
                      host_data_b64 = _extract_data(host_obs)

                      host = _b64get_any(host_data_b64, ["host"]) or f"{cluster_name}-primary.{workshop_ns}.svc"
                      port = _b64get_any(host_data_b64, ["port"]) or "5432"
                      user = _b64get_any(host_data_b64, ["user"]) or "postgres"
                      password = _b64get_any(host_data_b64, ["password"]) or ""
                      internal_url = _b64get_any(host_data_b64, ["uri"]) or ""

                      manifest["stringData"][_pg_key(cluster_name, "HOST")] = host
                      manifest["stringData"][_pg_key(cluster_name, "PORT")] = port
                      manifest["stringData"][_pg_key(cluster_name, "USER")] = user
                      manifest["stringData"][_pg_key(cluster_name, "PASSWORD")] = password
                      manifest["stringData"][_pg_key(cluster_name, "DATABASES")] = ",".join(dbnames)

                      host_ext = ""
                      if has_gateway_parent:
                          host_ext = f"{cluster_name}-{workshop_ns}.{ingress_domain}:443"
                          manifest["stringData"][_pg_key(cluster_name, "HOST_EXTERNAL")] = host_ext.split(":")[0]

                      for dbname in dbnames:
                          db_url = _uri_with_database(internal_url, dbname)
                          if not db_url and password:
                              db_url = (
                                  f"postgresql://{user}:{password}@{host}:{port}/{dbname}"
                              )
                          if db_url:
                              manifest["stringData"][_pg_db_key(cluster_name, dbname, "URL")] = db_url
                          if host_ext and db_url:
                              manifest["stringData"][_pg_db_key(cluster_name, dbname, "URL_EXTERNAL")] = (
                                  _external_pg_url(db_url, host_ext)
                              )

              key = f"secret-{xr_name}-datalab"
              rsp.desired.resources[key].resource.update(manifest)
              rsp.desired.resources[key].ready = True

    - step: update-keycloak-objects
      functionRef:
        name: crossplane-contrib-function-python
      input:
        apiVersion: python.fn.crossplane.io/v1beta1
        kind: Script
        script: |
          from crossplane.function.proto.v1 import run_function_pb2 as fnv1
          from google.protobuf import json_format as _json_format

          def _to_dict(struct):
              return {} if struct is None else _json_format.MessageToDict(struct, preserving_proto_field_name=True)

          def _distinct(seq):
              return list(dict.fromkeys(seq))

          def _safe_str(v):
              return str(v).strip() if v is not None else ""

          def _session_name(session):
              if isinstance(session, dict):
                  return _safe_str(session.get("name") or "")
              return _safe_str(session)

          def _workspace_redirect_uris(xr_name, domain, session_names):
              uris = [f"https://{xr_name}.{domain}/*"]
              for sid in session_names:
                  session_host = f"{xr_name}-{sid}"
                  uris.extend([
                      f"https://{session_host}.{domain}/*",
                      f"https://editor-{session_host}.{domain}/*",
                      f"https://{session_host}-editor.{domain}/*",
                      f"https://data-{session_host}.{domain}/*",
                      f"https://{session_host}-data.{domain}/*",
                  ])
              uris.append("http://localhost:*")
              return _distinct(uris)

          def compose(req: fnv1.RunFunctionRequest, rsp: fnv1.RunFunctionResponse):
              xr = _to_dict(req.observed.composite.resource)
              meta = xr.get("metadata", {}) or {}
              spec = xr.get("spec", {}) or {}

              xr_name = meta.get("name")
              xr_namespace = meta.get("namespace") or "default"

              ctx = _to_dict(req.context)
              env = ctx.get("apiextensions.crossplane.io/environment", {}) or {}
              iam_env = env.get("iam") or {}
              ingress_env = env.get("ingress") or {}
              realm = iam_env.get("realm", "default")
              domain = ingress_env.get("domain", "default")
              url = f"https://{xr_name}.{domain}"
              session_names = [
                  _session_name(session)
                  for session in (spec.get("sessions") or [])
                  if _session_name(session)
              ]
              redirect_uris = _workspace_redirect_uris(xr_name, domain, session_names)

              def put(key_base, body_base, name_override=xr_name):
                  key = f"{key_base}-{name_override}"
                  body = body_base.copy()
                  md = body.setdefault("metadata", {})
                  md.setdefault("name", name_override)
                  md.setdefault("namespace", xr_namespace)
                  ann = md.setdefault("annotations", {})
                  ann["crossplane.io/composition-resource-name"] = key
                  rsp.desired.resources[key].resource.update(body)

              put("keycloak-group", {
                  "apiVersion": "group.keycloak.m.crossplane.io/v1alpha1",
                  "kind": "Group",
                  "spec": {
                      "providerConfigRef": {"name": "provider-keycloak", "kind": "ProviderConfig"},
                      "forProvider": {"name": xr_name, "realmId": realm},
                  },
              })

              put("keycloak-group-admin", {
                  "apiVersion": "group.keycloak.m.crossplane.io/v1alpha1",
                  "kind": "Group",
                  "spec": {
                      "providerConfigRef": {"name": "provider-keycloak", "kind": "ProviderConfig"},
                      "forProvider": {"name": f"{xr_name}-admin", "realmId": realm},
                  },
              }, f"{xr_name}-admin")

              put("keycloak-mapper", {
                  "apiVersion": "openidgroup.keycloak.m.crossplane.io/v1alpha1",
                  "kind": "GroupMembershipProtocolMapper",
                  "spec": {
                      "providerConfigRef": {"name": "provider-keycloak", "kind": "ProviderConfig"},
                      "forProvider": {
                          "claimName": "groups",
                          "clientIdSelector": {"matchLabels": {"crossplane.io/claim-name": xr_name}},
                          "addToAccessToken": False,
                          "addToIdToken": True,
                          "addToUserinfo": False,
                          "fullPath": False,
                          "name": xr_name,
                          "realmId": realm,
                      },
                  },
              })

              put("keycloak-client", {
                  "apiVersion": "openidclient.keycloak.m.crossplane.io/v1alpha1",
                  "kind": "Client",
                  "metadata": {"labels": {"crossplane.io/claim-name": xr_name}},
                  "spec": {
                      "providerConfigRef": {"name": "provider-keycloak", "kind": "ProviderConfig"},
                      "forProvider": {
                          "name": xr_name,
                          "clientId": xr_name,
                          "rootUrl": url,
                          "adminUrl": url,
                          "accessType": "PUBLIC",
                          "standardFlowEnabled": True,
                          "implicitFlowEnabled": True,
                          "directAccessGrantsEnabled": False,
                          "serviceAccountsEnabled": False,
                          "oauth2DeviceAuthorizationGrantEnabled": True,
                          "webOrigins": redirect_uris,
                          "validRedirectUris": redirect_uris,
                          "realmId": realm,
                      },
                  },
              })

              put("keycloak-role-user", {
                  "apiVersion": "role.keycloak.m.crossplane.io/v1alpha1",
                  "kind": "Role",
                  "spec": {
                      "providerConfigRef": {"name": "provider-keycloak", "kind": "ProviderConfig"},
                      "forProvider": {
                          "name": "ws_access",
                          "clientIdRef": {"name": xr_name, "policy": {"resolution": "Required"}},
                          "realmId": realm,
                      },
                  },
              }, f"{xr_name}-ws-access")

              put("keycloak-role-admin", {
                  "apiVersion": "role.keycloak.m.crossplane.io/v1alpha1",
                  "kind": "Role",
                  "spec": {
                      "providerConfigRef": {"name": "provider-keycloak", "kind": "ProviderConfig"},
                      "forProvider": {
                          "name": "ws_admin",
                          "clientIdRef": {"name": xr_name, "policy": {"resolution": "Required"}},
                          "realmId": realm,
                      },
                  },
              }, f"{xr_name}-ws-admin")

              put("keycloak-roles-user", {
                  "apiVersion": "group.keycloak.m.crossplane.io/v1alpha1",
                  "kind": "Roles",
                  "spec": {
                      "providerConfigRef": {"name": "provider-keycloak", "kind": "ProviderConfig"},
                      "forProvider": {
                          "realmId": realm,
                          "groupIdRef": {"name": xr_name, "policy": {"resolution": "Required"}},
                          "roleIdsRefs": [{"name": f"{xr_name}-ws-access", "policy": {"resolution": "Required"}}],
                      },
                  },
              })

              put("keycloak-roles-admin", {
                  "apiVersion": "group.keycloak.m.crossplane.io/v1alpha1",
                  "kind": "Roles",
                  "spec": {
                      "providerConfigRef": {"name": "provider-keycloak", "kind": "ProviderConfig"},
                      "forProvider": {
                          "realmId": realm,
                          "groupIdRef": {"name": f"{xr_name}-admin", "policy": {"resolution": "Required"}},
                          "roleIdsRefs": [{"name": f"{xr_name}-ws-admin", "policy": {"resolution": "Required"}}],
                      },
                  },
              }, f"{xr_name}-admin")

              users = list(spec.get("users", []) or [])
              userOverrides = spec.get("userOverrides", {}) or {}

              role_admins = [
                  u for u in users
                  if str(((userOverrides.get(u) or {}).get("role") or "")).strip() == "admin"
              ]

              admins = _distinct((users[0:1] or []) + role_admins)

              put("keycloak-memberships-users", {
                  "apiVersion": "group.keycloak.m.crossplane.io/v1alpha1",
                  "kind": "Memberships",
                  "spec": {
                      "providerConfigRef": {"name": "provider-keycloak", "kind": "ProviderConfig"},
                      "forProvider": {
                          "groupIdRef": {"name": xr_name, "policy": {"resolution": "Required"}},
                          "realmId": realm,
                          "members": users,
                      },
                  },
              })

              put("keycloak-memberships-admins", {
                  "apiVersion": "group.keycloak.m.crossplane.io/v1alpha1",
                  "kind": "Memberships",
                  "spec": {
                      "providerConfigRef": {"name": "provider-keycloak", "kind": "ProviderConfig"},
                      "forProvider": {
                          "groupIdRef": {"name": f"{xr_name}-admin", "policy": {"resolution": "Required"}},
                          "realmId": realm,
                          "members": admins,
                      },
                  },
              }, f"{xr_name}-admin")

    - step: update-educates-objects
      functionRef:
        name: crossplane-contrib-function-python
      input:
        apiVersion: python.fn.crossplane.io/v1beta1
        kind: Script
        script: |
          import base64 as _base64
          from crossplane.function.proto.v1 import run_function_pb2 as fnv1
          from google.protobuf import json_format as _json_format

          def _to_dict(struct):
              return {} if struct is None else _json_format.MessageToDict(struct, preserving_proto_field_name=True)

          def _boolish(v):
              if isinstance(v, bool):
                  return v
              return str(v).lower() in ("true", "1", "yes", "on")

          def _safe_str(v):
              return str(v).strip()

          def _b64get_any(d, keys):
              if not d:
                  return None
              for k in keys:
                  v = d.get(k)
                  if v is None:
                      continue
                  try:
                      return _base64.b64decode(v).decode("utf-8")
                  except Exception:
                      try:
                          return str(v)
                      except Exception:
                          pass
              return None

          def _extract_data(objres):
              if not objres or not getattr(objres, "resource", None):
                  return {}
              od = _to_dict(objres.resource)
              st = (od.get("status") or {}).get("atProvider") or {}
              m1 = st.get("manifest") or {}
              m2 = (st.get("raw") or {}).get("manifest") or {}
              return (m1.get("data") or m1.get("stringData") or m2.get("data") or m2.get("stringData") or {}) or {}

          def _extract_manifest(objres):
              if not objres or not getattr(objres, "resource", None):
                  return {}
              od = _to_dict(objres.resource)
              st = (od.get("status") or {}).get("atProvider") or {}
              return (st.get("manifest") or (st.get("raw") or {}).get("manifest") or {}) or {}

          def compose(req: fnv1.RunFunctionRequest, rsp: fnv1.RunFunctionResponse):
              xr = _to_dict(req.observed.composite.resource)
              meta = xr.get("metadata", {}) or {}
              spec = xr.get("spec", {}) or {}
              
              xr_name = meta.get("name")
              xr_namespace = meta.get("namespace") or "default"

              files = spec.get("files") or []
              def _session_name(session):
                  if isinstance(session, dict):
                      return _safe_str(session.get("name") or "")
                  return _safe_str(session)

              def _session_state(session):
                  if isinstance(session, dict):
                      state = _safe_str(session.get("state") or "started").lower()
                  else:
                      state = "started"
                  if state == "running":
                      return "started"
                  if state == "paused":
                      return "stopped"
                  return state

              sessions = [
                  _session_name(session)
                  for session in (spec.get("sessions") or [])
                  if _session_name(session)
              ]
              started_sessions = [
                  _session_name(session)
                  for session in (spec.get("sessions") or [])
                  if _session_name(session) and _session_state(session) == "started"
              ]
              vcluster = _boolish(spec.get("vcluster", False))
              db_service_names = []
              db_hosts = spec.get("databases") or {}
              if isinstance(db_hosts, dict):
                  for host_key in sorted(list(db_hosts.keys())):
                      if not isinstance(host_key, str) or not host_key.strip():
                          continue
                      host_cfg = db_hosts.get(host_key) or {}
                      if not isinstance(host_cfg, dict):
                          continue
                      dbnames = [_safe_str(x) for x in list(host_cfg.get("names") or []) if _safe_str(x)]
                      db_storage = _safe_str(host_cfg.get("storage") or "")
                      backup_storage = _safe_str(host_cfg.get("backupStorage") or "")
                      if dbnames and db_storage and backup_storage:
                          db_service_names.append(f"{host_key.strip()}-primary")

              ctx = _to_dict(req.context)
              env = ctx.get("apiextensions.crossplane.io/environment", {}) or {}
              defaults = (env.get("defaults") or {})
              env_quota = (defaults.get("quota") or {})
              quota = (spec.get("quota") or {})

              memory = quota.get("memory") or env_quota.get("memory") or "2Gi"
              storage = quota.get("storage") or env_quota.get("storage") or "1Gi"
              budget = quota.get("budget") or env_quota.get("budget") or "medium"

              env_security = (defaults.get("security") or {})
              security = (spec.get("security") or {})

              policy = (security.get("policy") or env_security.get("policy") or "baseline")

              ka = security.get("kubernetesAccess")
              if ka is None:
                  ka = env_security.get("kubernetesAccess")
              if ka is None:
                  ka = True
              kubernetes_access = _boolish(ka)

              role = (security.get("kubernetesRole") or env_security.get("kubernetesRole") or "edit")

              data_cfg = spec.get("data") or {}
              data_enabled = data_cfg.get("enabled")
              if data_enabled is None:
                  data_enabled = True
              data_enabled = _boolish(data_enabled)

              data_readonly = data_cfg.get("readOnlyMount")
              if data_readonly is None:
                  data_readonly = False
              data_readonly = _boolish(data_readonly)

              registry_cfg = spec.get("registry") or {}
              registry_enabled = registry_cfg.get("enabled")
              if registry_enabled is None:
                  registry_enabled = False
              registry_enabled = _boolish(registry_enabled)
              registry_storage = str(registry_cfg.get("storage") or "5Gi")

              persistence_cfg = spec.get("persistence") or {}
              requested_storage_class = _safe_str(persistence_cfg.get("storageClassName") or "")

              ingress_env = env.get("ingress") or {}
              storage_env = env.get("storage") or {}
              storage_classes_env = env.get("storageClasses") or {}
              allowed_storage_classes = [
                  _safe_str(sc)
                  for sc in (storage_classes_env.get("allowed") or [])
                  if _safe_str(sc)
              ]
              packages = env.get("packages") or []
              auth_env = env.get("auth") or {}

              ingress_class = ingress_env.get("class", "")
              ingress_domain = ingress_env.get("domain", "default")
              ingress_secret = ingress_env.get("secret", "wildcard-tls")

              auth_type = (auth_env.get("type") or "credentials").strip().lower()

              storage_secret_name = f"{xr_name}-datalab"
              persistent_storage_class = ""
              if allowed_storage_classes:
                  persistent_storage_class = (
                      requested_storage_class
                      if requested_storage_class in allowed_storage_classes
                      else allowed_storage_classes[0]
                  )
              else:
                  persistent_storage_class = requested_storage_class

              obs = (getattr(req.observed, "resources", {}) or {}).get(f"observe-storage-secret-{xr_name}")
              data_b64 = _extract_data(obs)

              access_key = _b64get_any(data_b64, ["AWS_ACCESS_KEY_ID","accessKey","username","CONSOLE_ACCESS_KEY","attribute.access"])
              secret_key = _b64get_any(data_b64, ["AWS_SECRET_ACCESS_KEY","secretKey","password","CONSOLE_SECRET_KEY","attribute.secret"])

              session_username = "*"
              session_password = ""

              if auth_type == "credentials" and access_key:
                  session_username = access_key
                  session_password = secret_key

              allow_web_egress = {
                  "apiVersion": "networking.k8s.io/v1",
                  "kind": "NetworkPolicy",
                  "metadata": {"name": "allow-web-egress"},
                  "spec": {
                      "podSelector": {},
                      "policyTypes": ["Egress"],
                      "egress": [
                          {
                              "to": [
                                  {"namespaceSelector": {"matchLabels": {"kubernetes.io/metadata.name": "kube-system"}}}
                              ],
                              "ports": [
                                  {"protocol": "UDP", "port": 53},
                                  {"protocol": "TCP", "port": 53}
                              ]
                          },
                          {
                              "to": [
                                  {"ipBlock": {"cidr": "10.0.0.0/8"}},
                                  {"ipBlock": {"cidr": "172.16.0.0/12"}},
                                  {"ipBlock": {"cidr": "192.168.0.0/16"}},
                                  {"ipBlock": {"cidr": "100.64.0.0/10"}}
                              ]
                          },
                          {"to": [{"ipBlock": {"cidr": "fc00::/7"}}]},
                          {"to": [{"namespaceSelector": {}}]},
                          {"to": [{"ipBlock": {"cidr": "0.0.0.0/0", "except": ["169.254.42.42/32"]}}]},
                          {"to": [{"ipBlock": {"cidr": "::/0", "except": ["fd00:42::42/128"]}}]}
                      ]
                  }
              }

              vcluster_cfg = {
                  "enabled": vcluster,
                  "version": "1.34",
                  "services": {
                      "fromHost": [
                          {
                              "from": f"$(workshop_namespace)/{host_svc_name}",
                              "to": f"$(workshop_namespace)/{host_svc_name}",
                          }
                          for host_svc_name in db_service_names
                      ]
                  },
              }

              workshop = {
                  "apiVersion": "training.educates.dev/v1beta1",
                  "kind": "Workshop",
                  "metadata": {"name": xr_name},
                  "spec": {
                      "title": "Default DataLab",
                      "description": "A default DataLab environment.",
                      "version": "1.0",
                      "session": {
                          "applications": {
                              "console": {"enabled": False},
                              "editor": {"enabled": True},
                              "slides": {"enabled": False},
                              "terminal": {"enabled": True},
                              "vcluster": vcluster_cfg,
                              "workshop": {"enabled": bool(files)}
                          },
                          "dashboards": [],
                          "ingresses": [],
                          "resources": {"memory": memory, "storage": storage},
                          "namespaces": {
                              "budget": budget,
                              "role": role,
                              "security": {
                                  "policy": policy,
                                  "token": {"enabled": kubernetes_access}
                              }
                          },
                          "envFrom": [{"secretRef": {"name": storage_secret_name}}],
                          "objects": []
                      },
                      "workshop": {
                          "files": files,
                          "packages": packages
                      },
                      "environment": {
                          "secrets": [{"name": storage_secret_name, "namespace": xr_namespace}],
                          "objects": [
                              allow_web_egress
                          ]
                      }
                  }
              }

              if sessions:
                  workshop["spec"]["session"]["resources"].pop("storage", None)
                  workshop["spec"]["session"]["resources"]["volume"] = {
                      "name": "$(session_name)-persistent"
                  }

              if data_enabled:
                  workshop["spec"]["session"]["dashboards"].append(
                      {"name": "Data", "url": "$(ingress_protocol)://data-$(session_name).$(ingress_domain)/"}
                  )
                  workshop["spec"]["session"]["ingresses"].append(
                      {
                          "name": "data",
                          "protocol": "http",
                          "host": "data.$(workshop_namespace).svc.$(cluster_domain)",
                          "port": 8080
                      }
                  )

                  data_deploy = {
                      "apiVersion": "apps/v1",
                      "kind": "Deployment",
                      "metadata": {
                          "name": "data",
                          "labels": {
                              "app.kubernetes.io/instance": "data",
                              "app.kubernetes.io/name": "data"
                          }
                      },
                      "spec": {
                          "replicas": 1,
                          "selector": {
                              "matchLabels": {
                                  "app.kubernetes.io/instance": "data",
                                  "app.kubernetes.io/name": "data"
                              }
                          },
                          "template": {
                              "metadata": {
                                  "labels": {
                                      "app.kubernetes.io/instance": "data",
                                      "app.kubernetes.io/name": "data"
                                  }
                              },
                              "spec": {
                                  "serviceAccountName": "$(service_account)",
                                  "containers": [{
                                      "name": "data",
                                      "image": "ghcr.io/versioneer-tech/package-r:v2025.7.1",
                                      "imagePullPolicy": "Always",
                                      "ports": [{"name": "http", "containerPort": 8080}],
                                      "env": [
                                          {"name": "FB_AUTH_MAPPER", "value": "reader-noshare" if data_readonly else "writer-noshare"},
                                          {"name": "WORKSPACE", "valueFrom": {"fieldRef": {"fieldPath": "metadata.namespace"}}},
                                          {"name": "FB_ROOT", "value": "/data"},
                                          {"name": "FB_BRANDING_NAME", "valueFrom": {"fieldRef": {"fieldPath": "metadata.namespace"}}},
                                          {"name": "FB_AUTH_HEADER", "value": "Accept"},
                                          {"name": "AWS_ACCESS_KEY_ID", "valueFrom": {"secretKeyRef": {"name": storage_secret_name, "key": "AWS_ACCESS_KEY_ID"}}},
                                          {"name": "AWS_SECRET_ACCESS_KEY", "valueFrom": {"secretKeyRef": {"name": storage_secret_name, "key": "AWS_SECRET_ACCESS_KEY"}}},
                                          {"name": "AWS_REGION", "valueFrom": {"secretKeyRef": {"name": storage_secret_name, "key": "AWS_REGION"}}},
                                          {"name": "AWS_ENDPOINT_URL", "valueFrom": {"secretKeyRef": {"name": storage_secret_name, "key": "AWS_ENDPOINT_URL"}}},
                                          {"name": "AWS_S3_FORCE_PATH_STYLE", "valueFrom": {"secretKeyRef": {"name": storage_secret_name, "key": "AWS_S3_FORCE_PATH_STYLE"}}}
                                      ],
                                      "resources": {
                                          "requests": {"cpu": "100m", "memory": "128Mi"},
                                          "limits": {"cpu": "1", "memory": "512Mi"}
                                      },
                                      "volumeMounts": [{
                                          "name": "data",
                                          "mountPath": "/data",
                                          "readOnly": True if data_readonly else False
                                      }]
                                  }],
                                  "volumes": [{"name": "data", "persistentVolumeClaim": {"claimName": storage_secret_name}}]
                              }
                          }
                      }
                  }

                  workshop["spec"]["environment"]["objects"].extend([
                      {
                          "apiVersion": "v1",
                          "kind": "PersistentVolumeClaim",
                          "metadata": {"name": storage_secret_name},
                          "spec": {
                              "accessModes": ["ReadOnlyMany"],
                              "resources": {"requests": {"storage": "1Mi"}},
                              "storageClassName": "csi-rclone"
                          }
                      },
                      data_deploy,
                      {
                          "apiVersion": "v1",
                          "kind": "Service",
                          "metadata": {"name": "data"},
                          "spec": {
                              "type": "ClusterIP",
                              "selector": {
                                  "app.kubernetes.io/instance": "data",
                                  "app.kubernetes.io/name": "data"
                              },
                              "ports": [
                                  {"name": "http", "port": 8080, "targetPort": "http", "protocol": "TCP"}
                              ]
                          }
                      }
                  ])

              if policy == "privileged":
                  workshop["spec"]["session"]["applications"]["docker"] = {
                      "enabled": True,
                      "storage": "20Gi"
                  }

              if registry_enabled:
                  workshop["spec"]["session"]["applications"]["registry"] = {
                      "enabled": True,
                      "storage": registry_storage
                  }

              if vcluster:
                  service_cidr = (
                      str((env.get("network") or {}).get("serviceCIDR") or "") or
                      "10.43.0.0/16"
                  )
                  workshop["spec"]["session"]["objects"].append({
                      "apiVersion": "v1",
                      "kind": "ConfigMap",
                      "metadata": {
                          "name": "vc-cidr-my-vcluster",
                          "namespace": "$(session_namespace)-vc"
                      },
                      "data": {"cidr": service_cidr}
                  })

              environment = {
                  "apiVersion": "training.educates.dev/v1beta1",
                  "kind": "WorkshopEnvironment",
                  "metadata": {"name": xr_name},
                  "spec": {
                      "analytics": {"amplitude": {"trackingId": ""}},
                      "cookies": {},
                      "environment": {"objects": [], "secrets": []},
                      "request": {"enabled": False},
                      "session": {"ingress": {"class": ingress_class, "domain": ingress_domain, "secret": ingress_secret}},
                      "theme": {"name": "default-website-theme"},
                      "workshop": {"name": xr_name}
                  }
              }

              def emit(kind, manifest, key_suffix="", readiness=None):
                  suffix = f"-{xr_name}{('-' + key_suffix) if key_suffix else ''}"
                  key = f"{kind.lower()}{suffix}"
                  body = {
                      "apiVersion": "kubernetes.m.crossplane.io/v1alpha1",
                      "kind": "Object",
                      "metadata": {
                          "name": key,
                          "namespace": xr_namespace,
                          "annotations": {"crossplane.io/composition-resource-name": key}
                      },
                      "spec": {
                          "providerConfigRef": {"name": "provider-kubernetes", "kind": "ProviderConfig"},
                          "forProvider": {"manifest": manifest},
                          "readiness": readiness or {"policy": "SuccessfulCreate"},
                          "watch": True
                      }
                  }
                  rsp.desired.resources[key].resource.update(body)

              emit("Workshop", workshop)
              emit(
                  "WorkshopEnvironment",
                  environment,
                  readiness={
                      "policy": "DeriveFromCelQuery",
                      "celQuery": "has(object.status) && has(object.status.educates) && object.status.educates.phase == 'Running'",
                  },
              )

              observed_resources = getattr(req.observed, "resources", {}) or {}
              env_manifest = _extract_manifest(observed_resources.get(f"workshopenvironment-{xr_name}"))
              workshop_ns = _safe_str(((env_manifest.get("status") or {}).get("educates") or {}).get("namespace") or xr_name)

              if workshop_ns:
                  for sid in sessions:
                      persistent_pvc_name = f"{xr_name}-{sid}-persistent"
                      persistent_pvc_spec = {
                          "accessModes": ["ReadWriteOnce"],
                          "resources": {"requests": {"storage": storage}}
                      }
                      if persistent_storage_class:
                          persistent_pvc_spec["storageClassName"] = persistent_storage_class
                      emit("PersistentVolumeClaim", {
                          "apiVersion": "v1",
                          "kind": "PersistentVolumeClaim",
                          "metadata": {"name": persistent_pvc_name, "namespace": workshop_ns},
                          "spec": persistent_pvc_spec
                      }, key_suffix=f"{sid}-persistent")

              for sid in started_sessions:
                  session_manifest = {
                      "apiVersion": "training.educates.dev/v1beta1",
                      "kind": "WorkshopSession",
                      "metadata": {"name": f"{xr_name}-{sid}"},
                      "spec": {
                          "environment": {"name": xr_name},
                          "session": {
                              "id": str(sid),
                              "ingress": {"domain": ingress_domain, "secret": ingress_secret},
                              "env": [
                                  {"name": "SESSION_NAME", "value": f"{xr_name}-{sid}"},
                                  {"name": "FRAME_ANCESTORS", "value": ""}
                              ] + (
                                  [{"name": "KUBECONFIG", "value": "/opt/kubeconfig/config"}]
                                  if vcluster else []
                              ),
                              "username": session_username,
                              "password": session_password
                          }
                      }
                  }
                  emit(
                      "WorkshopSession",
                      session_manifest,
                      key_suffix=str(sid),
                      readiness={
                          "policy": "DeriveFromCelQuery",
                          "celQuery": "has(object.status) && has(object.status.educates) && object.status.educates.phase == 'Running'",
                      },
                  )

    - step: update-database-objects
      functionRef:
        name: crossplane-contrib-function-python
      input:
        apiVersion: python.fn.crossplane.io/v1beta1
        kind: Script
        script: |
          from crossplane.function.proto.v1 import run_function_pb2 as fnv1
          from google.protobuf import json_format as _json_format

          def _to_dict(struct):
              return {} if struct is None else _json_format.MessageToDict(struct, preserving_proto_field_name=True)

          def _extract_manifest(objres):
              if not objres or not getattr(objres, "resource", None):
                  return {}
              od = _to_dict(objres.resource)
              atp = (od.get("status") or {}).get("atProvider") or {}
              m1 = atp.get("manifest") or {}
              m2 = (atp.get("raw") or {}).get("manifest") or {}
              return (m1 or m2) or {}

          def _safe_str(v):
              return str(v).strip()

          def _strong_token(seed):
              import hashlib
              import base64
              digest = hashlib.sha256((seed + ":provider-datalab").encode()).digest()
              token = base64.urlsafe_b64encode(digest).decode().rstrip("=")
              return token[:32]

          def compose(req: fnv1.RunFunctionRequest, rsp: fnv1.RunFunctionResponse):
              xr = _to_dict(req.observed.composite.resource)
              meta = xr.get("metadata", {}) or {}
              spec = xr.get("spec", {}) or {}

              xr_name = meta.get("name")
              xr_namespace = meta.get("namespace") or "default"

              db_hosts = spec.get("databases") or {}
              if not isinstance(db_hosts, dict) or not db_hosts:
                  return

              ctx = _to_dict(req.context)
              env = ctx.get("apiextensions.crossplane.io/environment", {}) or {}

              ingress_env = env.get("ingress") or {}
              ingress_domain = ingress_env.get("domain", "default")

              db_env = env.get("database") or {}
              gateway_env = db_env.get("gateway") or {}

              gateway_parent_name = _safe_str(gateway_env.get("parentName") or "")
              gateway_parent_ns = _safe_str(gateway_env.get("parentNamespace") or "")
              gateway_section = _safe_str(gateway_env.get("sectionName") or "")
              has_gateway_parent = bool(gateway_parent_name and gateway_parent_ns and gateway_section)

              data_sc_default = _safe_str(db_env.get("storageClassName") or "")
              backup_sc_default = _safe_str(db_env.get("backupStorageClassName") or "")

              users = list(spec.get("users", []) or [])
              admin_user = "postgres"
              other_users = [u for u in users if _safe_str(u) and _safe_str(u) != admin_user]
              users_all = [admin_user] + other_users

              observed = getattr(req.observed, "resources", None) or {}
              env_key = f"workshopenvironment-{xr_name}"
              env_manifest = _extract_manifest(observed.get(env_key))

              educates_status = (env_manifest.get("status") or {}).get("educates") or {}
              workshop_ns = _safe_str(educates_status.get("namespace") or xr_name)

              if not workshop_ns:
                  return

              def emit_obj(key, manifest, readiness=None, watch=True, management_policies=None):
                  body = {
                      "apiVersion": "kubernetes.m.crossplane.io/v1alpha1",
                      "kind": "Object",
                      "metadata": {
                          "name": key,
                          "namespace": xr_namespace,
                          "annotations": {"crossplane.io/composition-resource-name": key}
                      },
                      "spec": {
                          "providerConfigRef": {"name": "provider-kubernetes", "kind": "ProviderConfig"},
                          "forProvider": {"manifest": manifest},
                          "watch": watch
                      }
                  }
                  if readiness is not None:
                      body["spec"]["readiness"] = readiness
                  if management_policies:
                      body["spec"]["managementPolicies"] = management_policies
                  rsp.desired.resources[key].resource.update(body)

              for host_key in sorted(list(db_hosts.keys())):
                  if not isinstance(host_key, str) or not host_key.strip():
                      continue

                  host_cfg = db_hosts.get(host_key) or {}
                  if not isinstance(host_cfg, dict):
                      continue

                  dbnames = list(host_cfg.get("names") or [])
                  dbnames = [_safe_str(x) for x in dbnames if _safe_str(x)]
                  if not dbnames:
                      continue

                  db_storage = _safe_str(host_cfg.get("storage") or "")
                  backup_storage = _safe_str(host_cfg.get("backupStorage") or "")
                  if not db_storage or not backup_storage:
                      continue

                  db_storage_class = _safe_str(host_cfg.get("storageClassName") or data_sc_default)
                  backup_storage_class = _safe_str(host_cfg.get("backupStorageClassName") or backup_sc_default)

                  cluster_name = f"{host_key.strip()}"
                  cm_name = f"{cluster_name}-init-sql"
                  init_sql = "\\set ON_ERROR_STOP on\n\\connect postgres\n"

                  cm = {
                      "apiVersion": "v1",
                      "kind": "ConfigMap",
                      "metadata": {"name": cm_name, "namespace": workshop_ns},
                      "data": {"init.sql": init_sql},
                  }

                  data_vcs = {
                      "accessModes": ["ReadWriteOnce"],
                      "resources": {"requests": {"storage": db_storage}},
                  }
                  if db_storage_class:
                      data_vcs["storageClassName"] = db_storage_class

                  repo_vcs = {
                      "accessModes": ["ReadWriteOnce"],
                      "resources": {"requests": {"storage": backup_storage}},
                  }
                  if backup_storage_class:
                      repo_vcs["storageClassName"] = backup_storage_class

                  pg_cluster = {
                      "apiVersion": "postgres-operator.crunchydata.com/v1",
                      "kind": "PostgresCluster",
                      "metadata": {"name": cluster_name, "namespace": workshop_ns},
                      "spec": {
                          "postgresVersion": 17,
                          "postGISVersion": "3.5",
                          "databaseInitSQL": {"name": cm_name, "key": "init.sql"},
                          "instances": [{
                              "name": "primary",
                              "replicas": 1,
                              "dataVolumeClaimSpec": data_vcs,
                          }],
                          "backups": { # up to 4 weekly full backup cycles plus daily differentials within those cycles
                              "pgbackrest": {
                                "global": {
                                    "repo1-retention-full-type": "count",
                                    "repo1-retention-full": "4",
                                    "repo1-path": f"/pgbackrest/repo1",
                                },
                                "repos": [{
                                    "name": "repo1",
                                    "schedules": {
                                        "full": "0 1 * * 0",
                                        "differential": "0 1 * * 1-6",
                                    },
                                    "volume": {
                                        "volumeClaimSpec": repo_vcs,
                                    },
                                }],
                              }
                          },
                      },
                  }

                  if users_all:
                      pg_cluster["spec"]["users"] = (
                          [{"name": admin_user, "databases": dbnames}] +
                          [{"name": u} for u in other_users]
                      )

                  emit_obj(
                      f"db-configmap-{xr_name}-{cluster_name}",
                      cm,
                      readiness={"policy": "SuccessfulCreate"},
                      watch=True,
                  )
                  emit_obj(
                      f"db-postgrescluster-{xr_name}-{cluster_name}",
                      pg_cluster,
                      readiness={
                          "policy": "DeriveFromCelQuery",
                          "celQuery": "has(object.status) && has(object.status.instances) && object.status.instances.exists(i, i.name == 'primary' && has(i.readyReplicas) && i.readyReplicas >= 1) && has(object.status.pgbackrest) && has(object.status.pgbackrest.repoHost) && object.status.pgbackrest.repoHost.ready == true",
                      },
                      watch=True,
                  )

                  if not has_gateway_parent:
                      continue

                  hostname = f"{cluster_name}-{workshop_ns}.{ingress_domain}"
                  route = {
                      "apiVersion": "gateway.networking.k8s.io/v1",
                      "kind": "TLSRoute",
                      "metadata": {"name": cluster_name, "namespace": workshop_ns},
                      "spec": {
                          "parentRefs": [{
                              "name": gateway_parent_name,
                              "namespace": gateway_parent_ns,
                              "sectionName": gateway_section
                          }],
                          "hostnames": [hostname],
                          "rules": [{
                              "backendRefs": [{
                                "name": f"{cluster_name}-primary",
                                "port": 5432
                              }]
                          }]
                      }
                  }

                  emit_obj(
                      f"db-tlsroute-{xr_name}-{cluster_name}",
                      route,
                      readiness={
                          "policy": "DeriveFromCelQuery",
                          "celQuery": "has(object.status) && has(object.status.parents) && object.status.parents.exists(p, has(p.conditions) && p.conditions.exists(c, c.type == 'Accepted' && c.status == 'True') && p.conditions.exists(c, c.type == 'ResolvedRefs' && c.status == 'True'))",
                      },
                      watch=True,
                  )

    - step: update-mongodb-objects
      functionRef:
        name: crossplane-contrib-function-python
      input:
        apiVersion: python.fn.crossplane.io/v1beta1
        kind: Script
        script: |
          from crossplane.function.proto.v1 import run_function_pb2 as fnv1
          from google.protobuf import json_format as _json_format

          def _to_dict(struct):
              return {} if struct is None else _json_format.MessageToDict(struct, preserving_proto_field_name=True)

          def _extract_manifest(objres):
              if not objres or not getattr(objres, "resource", None):
                  return {}
              od = _to_dict(objres.resource)
              atp = (od.get("status") or {}).get("atProvider") or {}
              m1 = atp.get("manifest") or {}
              m2 = (atp.get("raw") or {}).get("manifest") or {}
              return (m1 or m2) or {}

          def _safe_str(v):
              return str(v).strip()

          def _strong_token(seed):
              import hashlib
              import base64
              digest = hashlib.sha256((seed + ":provider-datalab").encode()).digest()
              token = base64.urlsafe_b64encode(digest).decode().rstrip("=")
              return token[:32]

          def compose(req: fnv1.RunFunctionRequest, rsp: fnv1.RunFunctionResponse):
              xr = _to_dict(req.observed.composite.resource)
              meta = xr.get("metadata", {}) or {}
              spec = xr.get("spec", {}) or {}

              xr_name = meta.get("name")
              xr_namespace = meta.get("namespace") or "default"

              document_stores = spec.get("documentStores")
              if not isinstance(document_stores, dict) or not document_stores:
                  return

              ctx = _to_dict(req.context)
              env = ctx.get("apiextensions.crossplane.io/environment", {}) or {}
              mongo_env = env.get("mongodb") or {}
              mongo_storage_class = _safe_str(mongo_env.get("storageClassName") or "")

              observed = getattr(req.observed, "resources", None) or {}
              env_key = f"workshopenvironment-{xr_name}"
              env_manifest = _extract_manifest(observed.get(env_key))

              educates_status = (env_manifest.get("status") or {}).get("educates") or {}
              workshop_ns = _safe_str(educates_status.get("namespace") or xr_name)

              if not workshop_ns:
                  return

              # MongoDB operator expects these namespace-local prerequisites.
              prereqs = [
                  (
                      f"mongodb-sa-appdb-{xr_name}",
                      {
                          "apiVersion": "v1",
                          "kind": "ServiceAccount",
                          "metadata": {"name": "mongodb-kubernetes-appdb", "namespace": workshop_ns},
                      },
                  ),
                  (
                      f"mongodb-sa-database-pods-{xr_name}",
                      {
                          "apiVersion": "v1",
                          "kind": "ServiceAccount",
                          "metadata": {"name": "mongodb-kubernetes-database-pods", "namespace": workshop_ns},
                      },
                  ),
                  (
                      f"mongodb-sa-ops-manager-{xr_name}",
                      {
                          "apiVersion": "v1",
                          "kind": "ServiceAccount",
                          "metadata": {"name": "mongodb-kubernetes-ops-manager", "namespace": workshop_ns},
                      },
                  ),
                  (
                      f"mongodb-role-appdb-{xr_name}",
                      {
                          "apiVersion": "rbac.authorization.k8s.io/v1",
                          "kind": "Role",
                          "metadata": {"name": "mongodb-kubernetes-appdb", "namespace": workshop_ns},
                          "rules": [
                              {"apiGroups": [""], "resources": ["secrets"], "verbs": ["get"]},
                              {"apiGroups": [""], "resources": ["pods"], "verbs": ["patch", "delete", "get"]},
                          ],
                      },
                  ),
                  (
                      f"mongodb-rb-appdb-{xr_name}",
                      {
                          "apiVersion": "rbac.authorization.k8s.io/v1",
                          "kind": "RoleBinding",
                          "metadata": {"name": "mongodb-kubernetes-appdb", "namespace": workshop_ns},
                          "roleRef": {
                              "apiGroup": "rbac.authorization.k8s.io",
                              "kind": "Role",
                              "name": "mongodb-kubernetes-appdb",
                          },
                          "subjects": [
                              {"kind": "ServiceAccount", "name": "mongodb-kubernetes-appdb", "namespace": workshop_ns}
                          ],
                      },
                  ),
              ]
              for key, manifest in prereqs:
                  body = {
                      "apiVersion": "kubernetes.m.crossplane.io/v1alpha1",
                      "kind": "Object",
                      "metadata": {
                          "name": key,
                          "namespace": xr_namespace,
                          "annotations": {"crossplane.io/composition-resource-name": key},
                      },
                      "spec": {
                          "providerConfigRef": {"name": "provider-kubernetes", "kind": "ProviderConfig"},
                          "forProvider": {"manifest": manifest},
                          "readiness": {"policy": "SuccessfulCreate"},
                          "watch": True,
                      },
                  }
                  rsp.desired.resources[key].resource.update(body)

              for store_key in sorted(list(document_stores.keys())):
                  if not isinstance(store_key, str) or not store_key.strip():
                      continue
                  store_cfg = document_stores.get(store_key) or {}
                  if not isinstance(store_cfg, dict):
                      continue

                  mongo_storage = _safe_str(store_cfg.get("storage") or "10Gi")
                  if not mongo_storage:
                      continue
                  pvc_spec = {
                      "accessModes": ["ReadWriteOnce"],
                      "resources": {"requests": {"storage": mongo_storage}},
                  }
                  if mongo_storage_class:
                      pvc_spec["storageClassName"] = mongo_storage_class

                  store_name = store_key.strip()
                  mongo_resource_name = f"mongodb-{store_name}"
                  password_secret_name = f"{store_name}-mongodb-auth"
                  mongo_password = _strong_token(f"{xr_name}:{store_name}:mongodb")
                  password_secret = {
                      "apiVersion": "v1",
                      "kind": "Secret",
                      "metadata": {"name": password_secret_name, "namespace": workshop_ns},
                      "type": "Opaque",
                      "stringData": {"password": mongo_password},
                  }
                  pwd_key = f"mongodb-auth-secret-{xr_name}-{store_name}"
                  pwd_body = {
                      "apiVersion": "kubernetes.m.crossplane.io/v1alpha1",
                      "kind": "Object",
                      "metadata": {
                          "name": pwd_key,
                          "namespace": xr_namespace,
                          "annotations": {"crossplane.io/composition-resource-name": pwd_key}
                      },
                      "spec": {
                          "providerConfigRef": {"name": "provider-kubernetes", "kind": "ProviderConfig"},
                          "forProvider": {"manifest": password_secret},
                          "readiness": {"policy": "SuccessfulCreate"},
                          "watch": True
                      }
                  }
                  rsp.desired.resources[pwd_key].resource.update(pwd_body)

                  mongo = {
                      "apiVersion": "mongodbcommunity.mongodb.com/v1",
                      "kind": "MongoDBCommunity",
                      "metadata": {"name": mongo_resource_name, "namespace": workshop_ns},
                      "spec": {
                          "members": 1,
                          "type": "ReplicaSet",
                          "version": "8.0.12",
                          "security": {
                              "authentication": {
                                  "modes": ["SCRAM"],
                                  "ignoreUnknownUsers": True,
                              }
                          },
                          "users": [{
                              "name": f"{store_name}-app",
                              "db": "admin",
                              "passwordSecretRef": {"name": password_secret_name, "key": "password"},
                              "roles": [
                                  {"name": "readWrite", "db": store_name},
                                  {"name": "dbAdmin", "db": store_name},
                              ],
                              "scramCredentialsSecretName": f"{store_name}-app-scram",
                          }],
                          "statefulSet": {
                              "spec": {
                                  "volumeClaimTemplates": [{
                                      "metadata": {"name": "data-volume"},
                                      "spec": pvc_spec,
                                  }]
                              }
                          }
                      }
                  }

                  key = f"mongodb-community-{xr_name}-{store_name}"
                  body = {
                      "apiVersion": "kubernetes.m.crossplane.io/v1alpha1",
                      "kind": "Object",
                      "metadata": {
                          "name": key,
                          "namespace": xr_namespace,
                          "annotations": {"crossplane.io/composition-resource-name": key}
                      },
                      "spec": {
                          "providerConfigRef": {"name": "provider-kubernetes", "kind": "ProviderConfig"},
                          "forProvider": {"manifest": mongo},
                          "readiness": {
                              "policy": "DeriveFromCelQuery",
                              "celQuery": "has(object.status) && object.status.phase == 'Running' && has(object.status.currentMongoDBMembers) && object.status.currentMongoDBMembers >= 1 && has(object.status.currentStatefulSetReplicas) && object.status.currentStatefulSetReplicas >= 1",
                          },
                          "watch": True
                      }
                  }
                  rsp.desired.resources[key].resource.update(body)

    - step: update-redis-objects
      functionRef:
        name: crossplane-contrib-function-python
      input:
        apiVersion: python.fn.crossplane.io/v1beta1
        kind: Script
        script: |
          from crossplane.function.proto.v1 import run_function_pb2 as fnv1
          from google.protobuf import json_format as jf
          import base64
          import hashlib

          def _to_dict(s):
              return {} if s is None else jf.MessageToDict(s, preserving_proto_field_name=True)

          def _extract_manifest(objres):
              if not objres or not getattr(objres, "resource", None):
                  return {}
              od = _to_dict(objres.resource)
              atp = (od.get("status") or {}).get("atProvider") or {}
              m1 = atp.get("manifest") or {}
              m2 = (atp.get("raw") or {}).get("manifest") or {}
              return (m1 or m2) or {}

          def _safe_str(v):
              return str(v).strip()

          def _strong_token(seed):
              d = hashlib.sha256(seed.encode("utf-8")).digest()
              return base64.urlsafe_b64encode(d).decode("ascii").rstrip("=")[:28]

          def compose(req: fnv1.RunFunctionRequest, rsp: fnv1.RunFunctionResponse):
              xr = _to_dict(req.observed.composite.resource)
              meta = xr.get("metadata", {}) or {}
              spec = xr.get("spec", {}) or {}

              xr_name = meta.get("name")
              xr_namespace = meta.get("namespace") or "default"

              cache_stores = spec.get("cacheStores")
              if not isinstance(cache_stores, dict) or not cache_stores:
                  return

              ctx = _to_dict(req.context)
              env = ctx.get("apiextensions.crossplane.io/environment", {}) or {}
              redis_env = env.get("redis") or {}
              redis_storage_class = _safe_str(redis_env.get("storageClassName") or "")

              observed = getattr(req.observed, "resources", None) or {}
              env_key = f"workshopenvironment-{xr_name}"
              env_manifest = _extract_manifest(observed.get(env_key))

              educates_status = (env_manifest.get("status") or {}).get("educates") or {}
              workshop_ns = _safe_str(educates_status.get("namespace") or xr_name)

              if not workshop_ns:
                  return

              for store_key in sorted(list(cache_stores.keys())):
                  if not isinstance(store_key, str) or not store_key.strip():
                      continue
                  store_cfg = cache_stores.get(store_key) or {}
                  if not isinstance(store_cfg, dict):
                      continue

                  redis_storage = _safe_str(store_cfg.get("storage") or "1Gi")
                  if not redis_storage:
                      continue
                  store_name = store_key.strip()
                  redis_password = _strong_token(f"{xr_name}:{store_name}:redis")
                  redis_auth_secret_name = f"{store_name}-redis-auth"
                  redis_auth_secret = {
                      "apiVersion": "v1",
                      "kind": "Secret",
                      "metadata": {"name": redis_auth_secret_name, "namespace": workshop_ns},
                      "type": "Opaque",
                      "stringData": {"password": redis_password},
                  }
                  auth_key = f"redis-auth-secret-{xr_name}-{store_name}"
                  auth_body = {
                      "apiVersion": "kubernetes.m.crossplane.io/v1alpha1",
                      "kind": "Object",
                      "metadata": {
                          "name": auth_key,
                          "namespace": xr_namespace,
                          "annotations": {"crossplane.io/composition-resource-name": auth_key}
                      },
                      "spec": {
                          "providerConfigRef": {"name": "provider-kubernetes", "kind": "ProviderConfig"},
                          "forProvider": {"manifest": redis_auth_secret},
                          "readiness": {"policy": "SuccessfulCreate"},
                          "watch": True
                      }
                  }
                  rsp.desired.resources[auth_key].resource.update(auth_body)

                  redis_acl_secret_name = f"{store_name}-redis-acl"
                  redis_acl_secret = {
                      "apiVersion": "v1",
                      "kind": "Secret",
                      "metadata": {"name": redis_acl_secret_name, "namespace": workshop_ns},
                      "type": "Opaque",
                      "stringData": {
                          "user.acl": f"user default on >{redis_password} ~* +@all\n"
                      },
                  }
                  acl_key = f"redis-acl-secret-{xr_name}-{store_name}"
                  acl_body = {
                      "apiVersion": "kubernetes.m.crossplane.io/v1alpha1",
                      "kind": "Object",
                      "metadata": {
                          "name": acl_key,
                          "namespace": xr_namespace,
                          "annotations": {"crossplane.io/composition-resource-name": acl_key}
                      },
                      "spec": {
                          "providerConfigRef": {"name": "provider-kubernetes", "kind": "ProviderConfig"},
                          "forProvider": {"manifest": redis_acl_secret},
                          "readiness": {"policy": "SuccessfulCreate"},
                          "watch": True
                      }
                  }
                  rsp.desired.resources[acl_key].resource.update(acl_body)

                  pvc_spec = {
                      "accessModes": ["ReadWriteOnce"],
                      "resources": {"requests": {"storage": redis_storage}},
                  }
                  if redis_storage_class:
                      pvc_spec["storageClassName"] = redis_storage_class

                  storage = {
                      "volumeClaimTemplate": {
                          "metadata": {},
                          "spec": pvc_spec,
                      },
                      "volumeMount": {},
                  }
                  redis_manifest = {
                      "apiVersion": "redis.redis.opstreelabs.in/v1beta2",
                      "kind": "Redis",
                      "metadata": {"name": store_name, "namespace": workshop_ns},
                      "spec": {
                          "initContainer": {
                              "enabled": True,
                              "image": "quay.io/opstree/redis:v7.0.15",
                              "imagePullPolicy": "IfNotPresent",
                              "command": ["sh", "-c"],
                              "args": ["mkdir -p /data/appendonlydir && chmod 0777 /data /data/appendonlydir"],
                              "securityContext": {"runAsUser": 0},
                          },
                          "kubernetesConfig": {
                              "image": "quay.io/opstree/redis:v7.0.15",
                              "imagePullPolicy": "IfNotPresent",
                              "redisSecret": {"name": redis_auth_secret_name, "key": "password"},
                              "updateStrategy": {},
                          },
                          "acl": {"secret": {"secretName": redis_acl_secret_name}},
                          "storage": storage,
                      },
                  }

                  key = f"redis-cache-{xr_name}-{store_name}"
                  body = {
                      "apiVersion": "kubernetes.m.crossplane.io/v1alpha1",
                      "kind": "Object",
                      "metadata": {
                          "name": key,
                          "namespace": xr_namespace,
                          "annotations": {"crossplane.io/composition-resource-name": key}
                      },
                      "spec": {
                          "providerConfigRef": {"name": "provider-kubernetes", "kind": "ProviderConfig"},
                          "forProvider": {"manifest": redis_manifest},
                          "readiness": {
                              "policy": "DeriveFromCelQuery",
                              "celQuery": "!has(object.metadata.deletionTimestamp)",
                          },
                          "watch": True
                      }
                  }
                  rsp.desired.resources[key].resource.update(body)

                  pod_key = f"redis-pod-{xr_name}-{store_name}"
                  pod_body = {
                      "apiVersion": "kubernetes.m.crossplane.io/v1alpha1",
                      "kind": "Object",
                      "metadata": {
                          "name": pod_key,
                          "namespace": xr_namespace,
                          "annotations": {"crossplane.io/composition-resource-name": pod_key}
                      },
                      "spec": {
                          "managementPolicies": ["Observe"],
                          "providerConfigRef": {"name": "provider-kubernetes", "kind": "ProviderConfig"},
                          "forProvider": {
                              "manifest": {
                                  "apiVersion": "v1",
                                  "kind": "Pod",
                                  "metadata": {"name": f"{store_name}-0", "namespace": workshop_ns},
                              }
                          },
                          "readiness": {
                              "policy": "DeriveFromCelQuery",
                              "celQuery": "has(object.status) && has(object.status.conditions) && object.status.conditions.exists(c, c.type == 'Ready' && c.status == 'True')",
                          },
                          "watch": True
                      }
                  }
                  rsp.desired.resources[pod_key].resource.update(pod_body)

    - step: update-qdrant-objects
      functionRef:
        name: crossplane-contrib-function-python
      input:
        apiVersion: python.fn.crossplane.io/v1beta1
        kind: Script
        script: |
          from crossplane.function.proto.v1 import run_function_pb2 as fnv1
          from google.protobuf import json_format as jf

          def _to_dict(s):
              return {} if s is None else jf.MessageToDict(s, preserving_proto_field_name=True)

          def _extract_manifest(objres):
              if not objres or not getattr(objres, "resource", None):
                  return {}
              od = _to_dict(objres.resource)
              atp = (od.get("status") or {}).get("atProvider") or {}
              m1 = atp.get("manifest") or {}
              m2 = (atp.get("raw") or {}).get("manifest") or {}
              return (m1 or m2) or {}

          def _safe_str(v):
              return str(v).strip()

          def _strong_token(seed):
              import hashlib
              import base64
              digest = hashlib.sha256((seed + ":provider-datalab").encode()).digest()
              token = base64.urlsafe_b64encode(digest).decode().rstrip("=")
              return token[:32]

          def compose(req: fnv1.RunFunctionRequest, rsp: fnv1.RunFunctionResponse):
              xr = _to_dict(req.observed.composite.resource)
              meta = xr.get("metadata", {}) or {}
              spec = xr.get("spec", {}) or {}

              xr_name = meta.get("name")
              xr_namespace = meta.get("namespace") or "default"

              vector_stores = spec.get("vectorStores")
              if not isinstance(vector_stores, dict) or not vector_stores:
                  return

              ctx = _to_dict(req.context)
              env = ctx.get("apiextensions.crossplane.io/environment", {}) or {}
              qdrant_env = env.get("qdrant") or {}
              qdrant_storage_class = _safe_str(qdrant_env.get("storageClassName") or "")

              observed = getattr(req.observed, "resources", None) or {}
              env_key = f"workshopenvironment-{xr_name}"
              env_manifest = _extract_manifest(observed.get(env_key))

              educates_status = (env_manifest.get("status") or {}).get("educates") or {}
              workshop_ns = _safe_str(educates_status.get("namespace") or xr_name)

              if not workshop_ns:
                  return

              for store_key in sorted(list(vector_stores.keys())):
                  if not isinstance(store_key, str) or not store_key.strip():
                      continue
                  store_cfg = vector_stores.get(store_key) or {}
                  if not isinstance(store_cfg, dict):
                      continue

                  qdrant_storage = _safe_str(store_cfg.get("storage") or "1Gi")
                  if not qdrant_storage:
                      continue
                  store_name = store_key.strip()
                  qdrant_auth_secret_name = f"{store_name}-qdrant-auth"
                  qdrant_auth_secret = {
                      "apiVersion": "v1",
                      "kind": "Secret",
                      "metadata": {"name": qdrant_auth_secret_name, "namespace": workshop_ns},
                      "type": "Opaque",
                      "stringData": {
                          "apiKey": _strong_token(f"{xr_name}:{store_name}:qdrant:write"),
                          "readApiKey": _strong_token(f"{xr_name}:{store_name}:qdrant:read"),
                      },
                  }
                  auth_key = f"qdrant-auth-secret-{xr_name}-{store_name}"
                  auth_body = {
                      "apiVersion": "kubernetes.m.crossplane.io/v1alpha1",
                      "kind": "Object",
                      "metadata": {
                          "name": auth_key,
                          "namespace": xr_namespace,
                          "annotations": {"crossplane.io/composition-resource-name": auth_key}
                      },
                      "spec": {
                          "providerConfigRef": {"name": "provider-kubernetes", "kind": "ProviderConfig"},
                          "forProvider": {"manifest": qdrant_auth_secret},
                          "readiness": {"policy": "SuccessfulCreate"},
                          "watch": True
                      }
                  }
                  rsp.desired.resources[auth_key].resource.update(auth_body)

                  persistence = {"size": qdrant_storage}
                  if qdrant_storage_class:
                      persistence["storageClassName"] = qdrant_storage_class

                  qdrant = {
                      "apiVersion": "qdrant.io/v1alpha1",
                      "kind": "QdrantCluster",
                      "metadata": {"name": store_name, "namespace": workshop_ns},
                      "spec": {
                          "antiAffinity": True,
                          "apiKey": {
                              "enabled": True,
                              "secret": {"name": qdrant_auth_secret_name, "key": "apiKey"},
                          },
                          "readApiKey": {
                              "enabled": True,
                              "secret": {"name": qdrant_auth_secret_name, "key": "readApiKey"},
                          },
                          "image": {
                              "repository": "qdrant/qdrant",
                              "tag": "v1.13.4",
                              "pullPolicy": "IfNotPresent",
                          },
                          "persistence": persistence,
                      }
                  }

                  key = f"qdrant-vector-{xr_name}-{store_name}"
                  body = {
                      "apiVersion": "kubernetes.m.crossplane.io/v1alpha1",
                      "kind": "Object",
                      "metadata": {
                          "name": key,
                          "namespace": xr_namespace,
                          "annotations": {"crossplane.io/composition-resource-name": key}
                      },
                      "spec": {
                          "providerConfigRef": {"name": "provider-kubernetes", "kind": "ProviderConfig"},
                          "forProvider": {"manifest": qdrant},
                          "readiness": {
                              "policy": "DeriveFromCelQuery",
                              "celQuery": "!has(object.metadata.deletionTimestamp)",
                          },
                          "watch": True
                      }
                  }
                  rsp.desired.resources[key].resource.update(body)

                  pod_key = f"qdrant-pod-{xr_name}-{store_name}"
                  pod_body = {
                      "apiVersion": "kubernetes.m.crossplane.io/v1alpha1",
                      "kind": "Object",
                      "metadata": {
                          "name": pod_key,
                          "namespace": xr_namespace,
                          "annotations": {"crossplane.io/composition-resource-name": pod_key}
                      },
                      "spec": {
                          "managementPolicies": ["Observe"],
                          "providerConfigRef": {"name": "provider-kubernetes", "kind": "ProviderConfig"},
                          "forProvider": {
                              "manifest": {
                                  "apiVersion": "v1",
                                  "kind": "Pod",
                                  "metadata": {"name": f"qdrant-{store_name}-0", "namespace": workshop_ns},
                              }
                          },
                          "readiness": {
                              "policy": "DeriveFromCelQuery",
                              "celQuery": "has(object.status) && has(object.status.conditions) && object.status.conditions.exists(c, c.type == 'Ready' && c.status == 'True')",
                          },
                          "watch": True
                      }
                  }
                  rsp.desired.resources[pod_key].resource.update(pod_body)

    - step: detect-educates-status
      functionRef:
        name: crossplane-contrib-function-python
      input:
        apiVersion: python.fn.crossplane.io/v1beta1
        kind: Script
        script: |
          from crossplane.function.proto.v1 import run_function_pb2 as fnv1
          from google.protobuf import json_format as jf
          from google.protobuf import struct_pb2 as st

          def _to_dict(s):
              return {} if s is None else jf.MessageToDict(s, preserving_proto_field_name=True)

          def _extract_manifest(objres):
              if not objres or not getattr(objres, "resource", None):
                  return {}
              od = _to_dict(objres.resource)
              atp = (od.get("status") or {}).get("atProvider") or {}
              return (atp.get("manifest") or (atp.get("raw") or {}).get("manifest") or {}) or {}

          def _safe_str(v):
              return str(v).strip() if v is not None else ""

          def _session_name(session):
              if isinstance(session, dict):
                  return _safe_str(session.get("name") or "")
              return _safe_str(session)

          def _session_state(session):
              if isinstance(session, dict):
                  state = _safe_str(session.get("state") or "started").lower()
              else:
                  state = "started"
              if state == "running":
                  return "started"
              if state == "paused":
                  return "stopped"
              return state

          def compose(req: fnv1.RunFunctionRequest, rsp: fnv1.RunFunctionResponse):
              observed = getattr(req.observed, "resources", None) or {}
              xr_obs = _to_dict(req.observed.composite.resource)
              meta = xr_obs.get("metadata", {}) or {}
              spec = xr_obs.get("spec", {}) or {}
              
              xr_name = meta.get("name")

              sessions_map = {}

              for session in spec.get("sessions") or []:
                  sid = _session_name(session)
                  state = _session_state(session)
                  if not sid:
                      continue

                  sessions_map[sid] = {"state": state}

                  if state != "started":
                      continue

                  key = f"workshopsession-{xr_name}-{sid}"
                  manifest = _extract_manifest(observed.get(key))
                  if not manifest:
                      continue

                  ws_spec = (manifest.get("spec") or {}).get("session") or {}
                  ws_id = str(ws_spec.get("id") or sid)

                  educates = (manifest.get("status") or {}).get("educates") or {}
                  phase = educates.get("phase")
                  url = educates.get("url")
                  message = educates.get("message")

                  if phase:
                      sessions_map[ws_id]["phase"] = phase
                  if message:
                      sessions_map[ws_id]["message"] = message
                  if phase == "Running" and url:
                      sessions_map[ws_id]["url"] = url

              cur_status = (xr_obs.get("status") or {}).copy()
              cur_status["sessions"] = sessions_map

              v = st.Value()
              jf.ParseDict(cur_status, v)
              rsp.desired.composite.resource.fields["status"].CopyFrom(v)

    - step: detect-datalab-status
