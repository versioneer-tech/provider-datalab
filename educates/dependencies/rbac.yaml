apiVersion: v1
kind: ServiceAccount
metadata:
  name: provider-kubernetes
  namespace: crossplane
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: provider-kubernetes-educates
rules:
- apiGroups:
  - "training.educates.dev"
  resources:
  - "*"
  verbs:
  - "*"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: provider-kubernetes-educates
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: provider-kubernetes-educates
subjects:
- kind: ServiceAccount
  name: provider-kubernetes
  namespace: crossplane
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: provider-kubernetes-database
rules:
- apiGroups:
  - "postgres-operator.crunchydata.com"
  - "mongodbcommunity.mongodb.com"
  - "redis.redis.opstreelabs.in"
  - "qdrant.io"
  - "gateway.networking.k8s.io"
  resources:
  - "*"
  verbs:
  - "*"
- apiGroups:
  - ""
  resources:
  - "pods"
  - "persistentvolumeclaims"
  verbs:
  - "get"
  - "list"
  - "watch"
  - "create"
  - "update"
  - "patch"
  - "delete"
- apiGroups:
  - ""
  resources:
  - "serviceaccounts"
  verbs:
  - "*"
- apiGroups:
  - "rbac.authorization.k8s.io"
  resources:
  - "roles"
  - "rolebindings"
  verbs:
  - "*"
- apiGroups:
  - "rbac.authorization.k8s.io"
  resources:
  - "clusterroles"
  resourceNames:
  - "mongodb-kubernetes-operator"
  - "mongodb-kubernetes-operator-pvc-resize"
  verbs:
  - "bind"
  - "escalate"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: provider-kubernetes-database
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: provider-kubernetes-database
subjects:
- kind: ServiceAccount
  name: provider-kubernetes
  namespace: crossplane
