# Example platform-side protection for Educates workshop sessions rendered by
# Provider Datalab. This uses APISIX openid-connect and the per-Datalab
# Keycloak client generated by the composition.
#
# Adapt namespaces, issuer names, storage settings, and the OIDC discovery URL
# for your cluster. The important Datalab-side setting is auth.type: delegated.
---
apiVersion: apiextensions.crossplane.io/v1beta1
kind: EnvironmentConfig
metadata:
  name: datalab
data:
  iam:
    realm: acme
  auth:
    type: delegated
  ingress:
    class: apisix
    domain: lab.acme.org
    secret: workspace-tls
  storage:
    endpoint: https://s3.acme.org
    provider: Other
    region: acme
    force_path_style: "true"
    secretNamespace: workspace
    type: s3
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: workspace-cert
  namespace: workspace
spec:
  dnsNames:
    - "*.lab.acme.org"
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt-dns-prod
  secretName: workspace-tls
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno:workspace-session-apisix-pluginconfigs
  labels:
    rbac.kyverno.io/aggregate-to-admission-controller: "true"
    rbac.kyverno.io/aggregate-to-background-controller: "true"
rules:
  - apiGroups:
      - apisix.apache.org
    resources:
      - apisixpluginconfigs
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: protect-workshop-sessions-apisix
spec:
  admission: true
  background: false
  rules:
    - name: generate-apisix-oidc-plugin-config
      match:
        any:
          - resources:
              kinds:
                - Ingress
              selector:
                matchLabels:
                  training.educates.dev/application: workshop
                  training.educates.dev/component: session
      preconditions:
        all:
          - key: "{{ request.object.spec.ingressClassName || '' }}"
            operator: Equals
            value: apisix
          - key: "{{ (request.object.spec.rules || [])[?host != null && ends_with(host, '.lab.acme.org')] | length(@) }}"
            operator: GreaterThan
            value: 0
          - key: "{{ request.object.metadata.labels.\"training.educates.dev/environment.name\" || '' }}"
            operator: NotEquals
            value: ""
      generate:
        apiVersion: apisix.apache.org/v2
        kind: ApisixPluginConfig
        name: "workspace-oidc-{{ request.object.metadata.labels.\"training.educates.dev/environment.name\" }}"
        namespace: "{{ request.namespace }}"
        synchronize: false
        data:
          metadata:
            labels:
              training.educates.dev/application: workshop
              training.educates.dev/component: session
              training.educates.dev/environment.name: "{{ request.object.metadata.labels.\"training.educates.dev/environment.name\" }}"
          spec:
            plugins:
              - name: openid-connect
                enable: true
                config:
                  discovery: "https://iam-auth.acme.org/realms/acme/.well-known/openid-configuration"
                  use_jwks: true
                  bearer_only: false
                  client_id: "{{ request.object.metadata.labels.\"training.educates.dev/environment.name\" }}"
                  client_secret: ""
                  session:
                    secret: "{{ random('[A-Za-z0-9]{32}') }}"
                  access_token_in_authorization_header: false
                  set_access_token_header: false
                  set_id_token_header: false
                  set_userinfo_header: false
                  set_refresh_token_header: false
    - name: add-apisix-oidc-plugin-config
      match:
        any:
          - resources:
              kinds:
                - Ingress
              selector:
                matchLabels:
                  training.educates.dev/application: workshop
                  training.educates.dev/component: session
      preconditions:
        all:
          - key: "{{ request.object.spec.ingressClassName || '' }}"
            operator: Equals
            value: apisix
          - key: "{{ (request.object.spec.rules || [])[?host != null && ends_with(host, '.lab.acme.org')] | length(@) }}"
            operator: GreaterThan
            value: 0
          - key: "{{ request.object.metadata.labels.\"training.educates.dev/environment.name\" || '' }}"
            operator: NotEquals
            value: ""
      mutate:
        patchStrategicMerge:
          metadata:
            annotations:
              +(k8s.apisix.apache.org/plugin-config-name): "workspace-oidc-{{ request.object.metadata.labels.\"training.educates.dev/environment.name\" }}"
    - name: set-apisix-class-for-workspace-registry-ingresses
      match:
        any:
          - resources:
              kinds:
                - Ingress
              selector:
                matchLabels:
                  training.educates.dev/application: registry
                  training.educates.dev/component: session
      preconditions:
        all:
          - key: "{{ request.object.spec.ingressClassName || '' }}"
            operator: NotEquals
            value: apisix
          - key: "{{ (request.object.spec.rules || [])[?host != null && ends_with(host, '.lab.acme.org')] | length(@) }}"
            operator: GreaterThan
            value: 0
      mutate:
        patchStrategicMerge:
          spec:
            ingressClassName: apisix
